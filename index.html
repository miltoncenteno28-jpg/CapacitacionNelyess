<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NELYESS - Capacitación</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #004a99;
            --secondary: #00c6ff;
            --dark: #1e293b;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #f0f2f5; 
            color: var(--dark); 
            overflow-x: hidden; 
        }

        /* PORTADA PRINCIPAL */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, rgba(0,74,153,0.9), rgba(0,198,255,0.8)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1200');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 8vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
            max-width: 600px;
        }

        /* GRID DE BOTONES PRINCIPALES */
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .btn-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px 20px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-card:hover {
            background: var(--white);
            color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .btn-card i { font-size: 2.5rem; }

        /* NUBE FLOTANTE (CHAT) */
        .chat-cloud {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 280px;
            height: 380px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            border: 1px solid #e2e8f0;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 12px;
            font-weight: 600;
            text-align: center;
            font-size: 0.85rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.8rem;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            background: #e2e8f0;
            padding: 8px 12px;
            border-radius: 12px;
            width: fit-content;
            max-width: 90%;
            word-wrap: break-word;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #f1f5f9;
        }

        .chat-input input {
            flex: 1;
            border: 1px solid #e2e8f0;
            padding: 8px 15px;
            border-radius: 20px;
            outline: none;
            font-size: 0.8rem;
        }

        .chat-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            margin-left: 5px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-btn:hover { background: var(--secondary); }

        /* Ajustes para móviles */
        @media (max-width: 600px) {
            .hero h1 { font-size: 2.2rem; }
            .grid-buttons { grid-template-columns: 1fr 1fr; } /* 2 columnas en móvil */
            .chat-cloud { width: 220px; height: 300px; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div style="margin-bottom: 20px;">
            <i class="fas fa-graduation-cap" style="font-size: 3rem; color: var(--secondary);"></i>
        </div>
        <h1>NELYESS CAPACITACIÓN</h1>
        <p>Portal operativo centralizado para el equipo comercial y de soporte</p>

        <div class="grid-buttons">
            <a href="#guia" class="btn-card">
                <i class="fas fa-book-open"></i>
                <span>GUÍA COMERCIAL</span>
            </a>
            
            <a href="#ventas" class="btn-card">
                <i class="fas fa-chart-line"></i>
                <span>VENTAS</span>
            </a>
            
            <a href="posventa.html" class="btn-card">
                <i class="fas fa-headset"></i>
                <span>POSVENTA</span>
            </a>
            
            <a href="#haylli" class="btn-card">
                <i class="fas fa-laptop-code"></i>
                <span>HAYLLI ERP</span>
            </a>
        </div>
    </section>

    <div class="chat-cloud" id="chat">
        <div class="chat-header">
            <i class="fas fa-comments"></i> Nube Grupal Nelyess
        </div>
        <div id="chat-messages">
            <div class="message">¡Bienvenido al equipo! 👋</div>
            <div class="message">Selecciona un área para ver los procesos.</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe un mensaje...">
            <button class="chat-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-messages');
            if (input.value.trim() !== "") {
                const msg = document.createElement('div');
                msg.className = 'message';
                // Estilo para el mensaje del usuario actual
                msg.style.background = '#004a99';
                msg.style.color = 'white';
                msg.style.alignSelf = 'flex-end';
                msg.textContent = input.value;
                container.appendChild(msg);
                input.value = "";
                container.scrollTop = container.scrollHeight;
            }
        }

        // Permitir enviar con la tecla Enter
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>

</body>
</html>
